<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background base gradient for deep dark tech aesthetic -->
    <linearGradient id="df-logo-bg" x1="14" y1="14" x2="86" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#181B26" />
      <stop offset="50%" stop-color="#0F121A" />
      <stop offset="100%" stop-color="#080A0F" />
    </linearGradient>

    <!-- Glossy border gradient for 3D metallic feel -->
    <linearGradient id="df-logo-border" x1="14" y1="14" x2="86" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A466A" />
      <stop offset="30%" stop-color="#1B2134" />
      <stop offset="70%" stop-color="#161A29" />
      <stop offset="100%" stop-color="#2D3856" />
    </linearGradient>

    <!-- Subtle inner glowing edge -->
    <linearGradient id="df-logo-inner-glow" x1="14" y1="14" x2="40" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.15)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </linearGradient>

    <!-- Lightning body fill (Electric Blue) -->
    <linearGradient id="df-logo-lightning-fill" x1="61" y1="20" x2="39" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60EFFF" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#0035FF" />
    </linearGradient>

    <!-- Lightning crisp stroke -->
    <linearGradient id="df-logo-lightning-stroke" x1="61" y1="20" x2="39" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#80DDFF" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.8" />
    </linearGradient>

    <!-- Shadow underneath the square -->
    <filter id="df-logo-shadow-base" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Powerful outer glow for the lightning bolt -->
    <filter id="df-logo-lightning-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base rounded square with inner & outer box treatments -->
  <rect x="14" y="14" width="72" height="72" rx="18" fill="url(#df-logo-bg)" filter="url(#df-logo-shadow-base)" />
  
  <!-- Outer glass/metallic border -->
  <rect x="14" y="14" width="72" height="72" rx="18" fill="transparent" stroke="url(#df-logo-border)" stroke-width="1.5" />
  
  <!-- Top inner highlight line to enhance geometry -->
  <rect x="15" y="15" width="70" height="70" rx="17" fill="transparent" stroke="url(#df-logo-inner-glow)" stroke-width="1" />

  <!-- Highly refined, mathematically perfect Lightning bolt -->
  <g filter="url(#df-logo-lightning-glow)">
    <!-- Main glowing body -->
    <path
      d="M 61 20 L 31 56 H 49 L 39 80 L 69 44 H 51 Z"
      fill="url(#df-logo-lightning-fill)"
      stroke="url(#df-logo-lightning-stroke)"
      stroke-width="1.8"
      stroke-linejoin="round"
    />
  </g>

  <!-- Extra ultra-white hyper-highlight on the top/left edge to simulate sharpness -->
  <path
    d="M 61 20 L 31 56 H 49 L 39 80"
    fill="transparent"
    stroke="rgba(255, 255, 255, 0.85)"
    stroke-width="0.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.75"
  />
</svg>
